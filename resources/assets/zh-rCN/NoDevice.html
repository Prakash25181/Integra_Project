<body bgcolor="#0D0D0D" text="#FFFFFF">
<h3 class="title">当无法找到设备时，请检查下列事项</h3>
<h4 class="header">设备</h4>
<ul type="1">
<li>确认设备电源已打开</li>
<li>确认设备已连接网络</li>
<li>您将需要打开“网络待机”功能，以从App控制打开机器电源。</li>
</ul>
<h4 class="header">智能手机</h4>
<ul type="1">
<li>确认设备和手机已经连接到同一网络</li>
</ul>
<h4 class="header">路由器</h4>
<ul type="1">
<li>确认路由器电源已打开</li>
<li>试着拔/插无线路由电源，尝试重启无线路由器。</li>
</ul>
</body>
