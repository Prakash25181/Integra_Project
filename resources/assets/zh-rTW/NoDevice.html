<h3 class="title">當無法找到設備時，請檢查下列事項</h3>
<h4 class="header">設備</h4>
<ul type="1">
<li>確認設備電源已開啟</li>
<li>確認設備已連接網路</li>
<li>您將需要打開“網路待機”功能，以從App控制打開機器電源。</li>
</ul>
<h4 class="header">智能手機</h4>
<ul type="1">
<li>確認設備和手機已經連接到同一網路</li>
</ul>
<h4 class="header">路由器</h4>
<ul type="1">
<li>確認路由器電源已開啟</li>
<li>嘗試拔除/插入無線路由器及設備的電源，檢查無線路由器的電源開啟狀態，並嘗試重新啟動無線路由器。</li>
</ul>
